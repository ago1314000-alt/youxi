<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魂色-无限列车 - 安卓下载</title>
    <style>
        :root {
            --page-width: 430px;
            --text-main: #f8fbff;
            --text-soft: rgba(248, 251, 255, 0.78);
            --panel-bg: rgba(10, 16, 28, 0.72);
            --panel-border: rgba(255, 255, 255, 0.12);
            --button-a: #ff8b55;
            --button-b: #ff5248;
            --button-shadow: rgba(255, 96, 77, 0.38);
            --glow: rgba(255, 180, 128, 0.28);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top center, rgba(255, 168, 92, 0.18), transparent 34%),
                linear-gradient(180deg, rgba(6, 10, 16, 0.18), rgba(6, 10, 16, 0.92)),
                url("https://img0.baidu.com/it/u=4272623333,2656337238&amp;fm=253&amp;app=138&amp;f=JPEG?w=800&amp;h=1422") center/cover no-repeat fixed;
        }

        .page {
            width: min(100%, var(--page-width));
            margin: 0 auto;
            padding: 20px 14px 108px;
        }

        .hero, .gallery {
            border-radius: 30px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            animation: fadeUp 0.7s ease both;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: 24px 18px 20px;
            background: linear-gradient(180deg, rgba(20, 28, 44, 0.7), rgba(8, 13, 24, 0.78));
            backdrop-filter: blur(12px);
        }

        .hero::after {
            content: "";
            position: absolute;
            right: -30px;
            top: -36px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow), rgba(255, 180, 128, 0));
            pointer-events: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff3e0;
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        .title {
            margin: 14px 0 8px;
            font-size: 38px;
            line-height: 1.04;
            font-weight: 900;
            text-shadow: 0 8px 26px rgba(0, 0, 0, 0.36);
        }

        .subtitle {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            color: #fff0e5;
        }

        .desc {
            margin: 10px 0 0;
            line-height: 1.8;
            font-size: 14px;
            color: var(--text-soft);
        }

        .gallery {
            margin-top: 18px;
            padding: 14px;
            background: var(--panel-bg);
            animation-duration: 0.85s;
        }

        .gallery-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .gallery-title {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
        }

        .gallery-note {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.68);
        }

        .stage {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
                rgba(4, 7, 12, 0.9);
            min-height: clamp(260px, 56vh, 520px);
        }

        .slider {
            width: 500%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            width: 20%;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shot-card {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 18px 46px rgba(0, 0, 0, 0.26);
        }

        .shot-card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.24);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .dot.active {
            width: 28px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--button-a), var(--button-b));
        }

        .sticky-download {
            position: fixed;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: min(100%, var(--page-width));
            padding: 12px 14px 18px;
            background: linear-gradient(180deg, rgba(10, 15, 26, 0), rgba(10, 15, 26, 0.92) 26%, rgba(10, 15, 26, 0.98));
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 58px;
            width: 100%;
            border-radius: 999px;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.03em;
            background: linear-gradient(180deg, var(--button-a), var(--button-b));
            box-shadow: 0 18px 34px var(--button-shadow);
            animation: pulseGlow 2.2s ease-in-out infinite;
        }

        .download-sub {
            margin-top: 8px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.72);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 18px 34px var(--button-shadow); }
            50% { box-shadow: 0 20px 42px rgba(255, 96, 77, 0.52); }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="badge">热门推荐 · 安卓下载</div>
            <h1 class="title">魂色-无限列车</h1>
            <p class="subtitle">鬼灭ip卡牌养成</p>
            <p class="desc">鬼灭无限之战革新开启！邂逅柱弦，通过层层战役，精心培养使其逐渐成长强大，助力炭治郎组建巅峰鬼杀队，在充满热血与策略的斩鬼宇宙中逆转战局，改写每个让人遗憾的剧情故事！</p>
        </section>

        <section class="gallery">
            <div class="gallery-head">
                <h2 class="gallery-title">游戏截图展示</h2>
                <span class="gallery-note">自动轮播 · 点击圆点切换</span>
            </div>
            <div class="stage">
                <div class="slider" id="sliderA">
                    <div class="slide"><div class="shot-card"><img src="https://t1.g.mi.com/thumbnail/jpeg/w600h60/AppStore/0b178c0d403cc4b63a55a40084ce5c1fcd5afa2ab" alt="游戏截图1"></div></div>
                    <div class="slide"><div class="shot-card"><img src="https://t1.g.mi.com/thumbnail/jpeg/w600h60/AppStore/0b7aad78b68884611a36922cbd41edc658a66d77d" alt="游戏截图2"></div></div>
                    <div class="slide"><div class="shot-card"><img src="https://t1.g.mi.com/thumbnail/jpeg/w600h60/AppStore/064da7804efef499799c1e9c18fa82ea0502a6a71" alt="游戏截图3"></div></div>
                    <div class="slide"><div class="shot-card"><img src="https://t1.g.mi.com/thumbnail/jpeg/w600h60/AppStore/061da8c2b47614ad4ae1e01bd81af75aff59a40b9" alt="游戏截图4"></div></div>
                    <div class="slide"><div class="shot-card"><img src="https://t1.g.mi.com/thumbnail/jpeg/w600h60/AppStore/0a56917efa9c54de0bd62bf53c216b3a62c754226" alt="游戏截图5"></div></div>
                </div>
            </div>
            <div class="dots" id="dotsA">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
                <div class="dot" data-index="3"></div>
                <div class="dot" data-index="4"></div>
            </div>
        </section>
    </main>

    <div class="sticky-download">
        <a href="https://game.youqia.com/d?1751689705838" class="download-btn">Android 立即下载</a>
        <div class="download-sub">点击按钮后立即下载安装</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const slider = document.getElementById('sliderA');
            const dots = document.querySelectorAll('#dotsA .dot');
            let currentIndex = 0;
            let timer;

            function updateSlider() {
                slider.style.transform = 'translateX(-' + (currentIndex * 20) + '%)';
                dots.forEach((dot, index) => dot.classList.toggle('active', index === currentIndex));
            }

            function startAutoPlay() {
                clearInterval(timer);
                timer = setInterval(() => {
                    currentIndex = (currentIndex + 1) % dots.length;
                    updateSlider();
                }, 2800);
            }

            dots.forEach(dot => {
                dot.addEventListener('click', function () {
                    currentIndex = Number(this.dataset.index);
                    updateSlider();
                    startAutoPlay();
                });
            });

            updateSlider();
            startAutoPlay();
        });
    </script>
</body>
</html>
